# R002: 成本预算控制
# 优先级: P0（最高）
# 创建时间: 2025-04-05

id: R002
name: 成本预算控制
priority: P0
enabled: true

# 预算配置
budget:
  # 单任务预算
  perTask:
    limit: 5.00 USD            # 单任务上限
    alertAt: 3.00 USD          # 3 美元时警告
    hardStop: true             # 超限强制停止
  
  # 每日预算
  perDay:
    limit: 100.00 USD          # 每日上限
    alertAt: 80.00 USD         # 80% 警告
    hardStop: true
  
  # 每月预算
  perMonth:
    limit: 2000.00 USD         # 每月上限
    alertAt: 1500.00 USD
    hardStop: true

# 实时监控
monitoring:
  updateInterval: 5000         # 5 秒更新一次
  trackPerAgent: true          # 按Agent追踪
  trackPerPhase: true          # 按阶段追踪

# 触发动作
actions:
  # 警告阈值
  alert:
    - notifyUser: true
      message: |
        ⚠️ 成本警告
        
        当前任务成本: ${{currentCost}}
        预算限制: ${{limit}}
        已使用: {{percentage}}%
        
        继续执行可能超出预算。
    - logEvent: true
  
  # 硬停止
  hardStop:
    - pauseTask: true
    - notifyUser: true
      message: |
        🛑 成本超限，任务已暂停
        
        当前成本: ${{currentCost}}
        预算限制: ${{limit}}
        
        请选择：
        1. 继续执行（需要确认）
        2. 调整预算上限
        3. 取消任务并回滚
    - requireUserDecision: true
    - logEvent: true

# 豁免情况
exemptions:
  - condition: "emergencyMode"
    description: "紧急模式下可临时提高预算 50%"
    newLimit: "{{originalLimit}} * 1.5"
    requirePostExecutionReport: true

# 成本优化建议
optimization:
  - trigger: "perTaskCost > 2.00"
    suggestion: "考虑拆分为多个小任务"
  
  - trigger: "subAgentIterations > 3"
    suggestion: "Sub Agent 迭代次数过多，建议人工介入"
  
  - trigger: "usingGLM5ForSimpleTask"
    suggestion: "简单任务建议切换到 GLM-4.7"

# 成本报告
reporting:
  perTask: true                # 每个任务生成成本报告
  perDay: true                 # 每日汇总
  breakdown:
    - byAgent                  # 按 Agent
    - byPhase                  # 按阶段
    - byModel                  # 按模型

# 示例
examples:
  - scenario: "单任务接近 $5 上限"
    trigger: "currentCost >= 3.00"
    action: "警告用户"
    
  - scenario: "单任务超过 $5 上限"
    trigger: "currentCost >= 5.00"
    action: "暂停任务，询问用户"
    
  - scenario: "每日成本超过 $100"
    trigger: "dailyCost >= 100.00"
    action: "暂停所有任务，必须用户确认才能继续"
