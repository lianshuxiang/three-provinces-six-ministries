# 最高权限规则 - 模型配置
# 
# 此规则优先级：最高 (Priority: 0 - CRITICAL)
# 适用范围：所有 agent、所有模块、所有场景
# 
# 强制要求：所有大模型调用必须使用 GLM-5
# 禁止使用：GLM-4, GLM-4-Flash, GLM-4-Plus, GLM-4.7, 或任何其他模型
# 
# 违反此规则：系统将拒绝执行并报错
# 
# 原因：确保系统一致性和最高质量输出
# 生效时间：2026-04-05 18:45:00 CST
# 授权人：用户（最高权限）

rule_id: R000_SUPREME_MODEL
priority: 0  # 最高优先级
category: critical
enforcement: mandatory
version: 1.0.0

metadata:
  created_at: 2026-04-05T18:45:00+08:00
  created_by: user_supreme_authority
  reason: "强制统一所有 agent 使用 GLM-5 模型"
  scope: "全局 - 所有模块"

conditions:
  - type: all_model_calls
    operator: always
    value: true

actions:
  - type: enforce_model
    model: glm-5
    strict: true
    error_message: "违规：禁止使用非 GLM-5 模型。请使用 GLM-5。"

validation:
  allowed_models:
    - glm-5
  forbidden_models:
    - glm-4
    - glm-4-flash
    - glm-4-plus
    - glm-4.7
    - glm-4-air
    - glm-4-airx
    - glm-4-long
    - any_other_model

compliance:
  check_frequency: every_call
  violation_action: reject_and_log
  audit_trail: true

overrides:
  can_override: false
  reason: "此规则为最高权限，不可被覆盖"

notes: |
  此规则确保系统所有部分都使用 GLM-5 模型：
  - 三省（中书省、门下省、尚书省）
  - 六部（工部、兵部、刑部、吏部、户部、礼部）
  - 成本监控系统
  - 迭代系统
  - 所有子系统和模块
  
  违反此规则将被视为系统错误。
