<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APA7 表格格式转换器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Times New Roman', Times, serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
        }
        .upload-area.dragover {
            border-color: #764ba2;
            background: #f8f9ff;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5a6fd6;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .sheet-selector {
            margin: 20px 0;
        }
        .sheet-item {
            display: inline-block;
            padding: 8px 16px;
            margin: 5px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
        }
        .sheet-item.active {
            background: #667eea;
            color: white;
        }
        .options {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 5px;
        }
        .option-item {
            margin: 10px 0;
        }
        .preview {
                margin: 20px 0;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 5px;
            overflow-x: auto;
        }
        .download-buttons {
            margin-top: 20px;
            text-align: center;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            text-align: center;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
                padding: 8px;
                border: 1px solid #000;
            text-align: left;
            font-weight: bold;
            font-family: 'Times New Roman', Times, serif;
            font-size: 12px;
            background-color: #f0f0f0;
            border-bottom: 2px solid #000;
            border-top: 1px solid #000;
            border-left: none;
            border-right: none;
        }
        td {
                padding: 8px;
                text-align: left;
                border: none;
                border-bottom: 1px solid #000;
            font-family: 'Times New Roman', Times, serif;
                font-size: 12px;
            background-color: #fff;
            border-left: none;
            border-right: none;
        }
        tr:nth-child(even) td {
                background-color: #f9f9f9;
            }
            tr:nth-child(odd) td {
                background-color: #fff;
            }
        .table-note {
                font-style: italic;
                font-size: 12px;
                text-align: left;
                margin-top: 10px;
                border: none;
            font-family: 'Times New Roman', Times, serif;
            color: #666;
            background-color: #fff;
            padding: 5px;
            border-top: 1px solid #000;
                border-left: none;
                border-right: none;
            }
        .title {
                font-weight: bold;
            font-size: 12px;
            font-family: 'Times New Roman', Times, serif;
            text-align: left;
            border: none;
            background-color: #f0f0f0;
            border-bottom: 1px solid #000;
        }
        .title-italic {
                font-style: italic;
                font-weight: normal;
                font-size: 12px;
            font-family: 'Times New Roman', Times, serif;
            text-align: left;
            border: none;
            border-bottom: 1px solid #000;
            background-color: #f0f0f0;
            padding: 5px;
            border-left: none;
            border-right: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 APA7 表格格式转换器</h1>
        
        <div class="upload-area" id="dropZone">
            <p>📁 拖拽 Excel 或 CSV 文件到此处，或点击选择文件</p>
            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">选择文件</button>
        </div>

        <div id="fileInfo" style="display:none; margin: 15px 0; padding: 10px; background: #e8f4fd; border-radius: 5px;">
            <span id="fileName"></span>
        </div>

        <div class="sheet-selector" id="sheetSelector" style="display:none;">
            <h4>📑 选择 Sheet:</h4>
            <div id="sheetList"></div>
        </div>

        <div class="options" id="formatOptions">
            <h4>⚙️ 格式选项</h4>
            <div class="option-item">
                <label><input type="checkbox" id="showNumber" checked> 表格编号 (如: 表 1)</label>
            </div>
            <div class="option-item">
                <label><input type="checkbox" id="boldHeader" checked> 列标题加粗</label>
            </div>
            <div class="option-item">
                <label><input type="checkbox" id="showBorder" checked> 显示边框</label>
            </div>
            <div class="option-item">
                <label><input type="checkbox" id="italicTitle" checked> 标题斜体</label>
            </div>
        </div>

        <button class="btn btn-primary" id="convertBtn" onclick="convertToAPA()">🔄 转换为 APA 格式</button>

        <div id="status"></div>

        <div class="preview" id="preview" style="display:none;">
            <h4>👁️ 预览</h4>
            <div id="tablePreview"></div>
        </div>

        <div class="download-buttons" id="downloadButtons" style="display:none">
            <button class="btn btn-success" onclick="downloadAsWord()">📥 下载 Word</button>
            <button class="btn btn-success" onclick="downloadAsExcel()">📊 下载 Excel</button>
            <button class="btn btn-secondary" onclick="downloadAsHTML()">💾 下载 HTML</button>
        </div>
    </div>

    <script>
        let currentWorkbook = null;
        let currentSheetName = null;
        let currentData = null;
        let convertedTable = null;

        // 拖拽上传
        const dropZone = document.getElementById('dropZone');
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            handleFile(file);
        });

        // 文件选择
        document.getElementById('fileInput').addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            const fileName = file.name.toLowerCase();
            
            if (fileName.endsWith('.csv')) {
                // 处理 CSV 文件
                const reader = new FileReader();
                reader.onload = (e) => {
                    const content = e.target.result;
                    parseCSV(content);
                    showFileInfo(file.name, file.size);
                };
                reader.readAsText(file);
            } else if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) {
                // 处理 Excel 文件
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = new Uint8Array(e.target.result);
                    currentWorkbook = XLSX.read(data, { type: 'array' });
                    showSheetSelector();
                    showFileInfo(file.name, file.size);
                };
                reader.readAsArrayBuffer(file);
            } else {
                showStatus('error', '❌ 不支持的文件格式，请上传 Excel 或 CSV 文件');
            }
        }

        function parseCSV(content) {
            const lines = content.split('\n');
            const headers = lines[0].split(',');
            currentData = [headers];
            
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim()) {
                    currentData.push(lines[i].split(','));
                }
            }
            
            document.getElementById('convertBtn').disabled = false;
        }

        function showSheetSelector() {
            document.getElementById('sheetSelector').style.display = 'block';
            const sheetList = document.getElementById('sheetList');
            sheetList.innerHTML = '';
            
            currentWorkbook.SheetNames.forEach((name, index) => {
                const item = document.createElement('div');
                item.className = 'sheet-item' + (index === 0 ? ' active' : '');
                item.textContent = name;
                item.onclick = () => selectSheet(name);
                sheetList.appendChild(item);
            });
            
            selectSheet(currentWorkbook.SheetNames[0]);
        }

        function selectSheet(name) {
            currentSheetName = name;
            document.querySelectorAll('.sheet-item').forEach(item => {
                item.classList.remove('active');
                if (item.textContent === name) {
                    item.classList.add('active');
                }
            });
            
            const worksheet = currentWorkbook.Sheets[name];
            currentData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            
            document.getElementById('convertBtn').disabled = false;
        }

        function showFileInfo(name, size) {
            const fileInfo = document.getElementById('fileInfo');
            fileInfo.style.display = 'block';
            document.getElementById('fileName').textContent = `${name} (${(size / 1024).toFixed(1)} KB)`;
        }

        function convertToAPA() {
            if (!currentData || currentData.length === 0) {
                showStatus('error', '❌ 没有数据可转换');
                return;
            }

            const showNumber = document.getElementById('showNumber').checked;
            const boldHeader = document.getElementById('boldHeader').checked;
            const showBorder = document.getElementById('showBorder').checked;
            const italicTitle = document.getElementById('italicTitle').checked;

            // 获取表格标题
            let tableName = currentSheetName || 'Table';
            
            // 生成表格编号
            let numberHTML = showNumber ? '<p class="title">Table 1</p>' : '';
            
            // 生成表格标题（斜体）
            let captionClass = italicTitle ? 'title-italic' : 'title';
            let captionHTML = `<p class="${captionClass}">${tableName}</p>`;
            
            // 生成表格
            let tableHTML = '<table>\n';
            
            // 表头
            if (currentData.length > 0) {
                const headers = currentData[0];
                tableHTML += '<thead><tr>\n';
                headers.forEach(header => {
                    const style = boldHeader ? 'style="font-weight: bold;"' : '';
                    tableHTML += `<th ${style}>${header || ''}</th>\n`;
                });
                tableHTML += '</tr></thead>\n';
            }
            
            // 表体
            tableHTML += '<tbody>\n';
            for (let i = 1; i < currentData.length; i++) {
                tableHTML += '<tr>\n';
                currentData[i].forEach(cell => {
                    tableHTML += `<td>${cell || ''}</td>\n`;
                });
                tableHTML += '</tr>\n';
            }
            tableHTML += '</tbody>\n';
            tableHTML += '</table>';
            
            // 表格注释
            let noteHTML = '<p class="table-note">Note. </p>';

            // 组合完整 HTML
            convertedTable = `
                ${numberHTML}
                ${captionHTML}
                ${tableHTML}
                ${noteHTML}
            `;

            // 显示预览
            document.getElementById('tablePreview').innerHTML = convertedTable;
            document.getElementById('preview').style.display = 'block';
            document.getElementById('downloadButtons').style.display = 'block';
            
            showStatus('success', '✅ 转换成功!');
        }

        function downloadAsHTML() {
            if (!convertedTable) {
                showStatus('error', '❌ 请先转换表格');
                return;
            }
            
            const blob = new Blob([convertedTable], { type: 'text/html' });
            download(blob, 'apa-table.html');
        }

        function downloadAsWord() {
            if (!convertedTable) {
                showStatus('error', '❌ 请先转换表格');
                return;
            }
            
            const html = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Times New Roman', Times, serif; }
        table { border-collapse: collapse; }
        td, th { border: 1px solid #000; padding: 8px; }
    </style>
</head>
<body>
    ${convertedTable}
</body>
</html>
            `;
            
            const blob = new Blob([html], { type: 'application/msword' });
            download(blob, 'apa-table.doc');
        }

        function downloadAsExcel() {
            if (!currentData) {
                showStatus('error', '❌ 请先转换表格');
                return;
            }
            
            const ws = XLSX.utils.json_to_sheet(currentData);
            const wb = XLSX.utils.book_new_sheet(wb, 'APA Table');
            XLSX.utils.book_append_sheet(wb, ws, 'Table');
            XLSX.writeFile(wb, 'apa-table.xlsx');
        }

        function download(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function showStatus(type, message) {
            const status = document.getElementById('status');
            status.className = 'status ' + type;
            status.textContent = message;
            status.style.display = 'block';
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
