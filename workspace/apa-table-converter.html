<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APA7 表格格式转换器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Times New Roman', Times, serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
        }
        .upload-area.dragover {
            border-color: #764ba2;
            background: #f8f9ff;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5a6fd6;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-warning {
            background: #ffc107;
            color: #333;
        }
        .sheet-selector {
            margin: 20px 0;
        }
        .sheet-item {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            margin: 5px;
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sheet-item.selected {
            background: #667eea;
            color: white;
            border-color: #5a6fd6;
        }
        .sheet-item input[type="checkbox"] {
            margin-right: 8px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .sheet-actions {
            margin: 15px 0;
            padding: 10px;
            background: #f8f9ff;
            border-radius: 5px;
        }
        .options {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 5px;
        }
        .option-item {
            margin: 10px 0;
        }
        .preview {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 5px;
            overflow-x: auto;
        }
        .download-buttons {
            margin-top: 20px;
            text-align: center;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            text-align: center;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .status.info {
            background: #cce5ff;
            color: #004085;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }
        th, td {
            padding: 8px;
            text-align: left;
            font-family: 'Times New Roman', Times, serif;
            font-size: 12px;
        }
        th {
            font-weight: bold;
            border-bottom: 2px solid #000;
            border-top: 1px solid #000;
            background-color: #f0f0f0;
        }
        td {
            border-bottom: 1px solid #000;
        }
        .table-note {
            font-style: italic;
            font-size: 12px;
            text-align: left;
            margin-top: 10px;
            font-family: 'Times New Roman', Times, serif;
            color: #666;
        }
        .title {
            font-weight: bold;
            font-size: 12px;
            font-family: 'Times New Roman', Times, serif;
            text-align: left;
            margin-bottom: 5px;
        }
        .title-italic {
            font-style: italic;
            font-weight: normal;
            font-size: 12px;
            font-family: 'Times New Roman', Times, serif;
            text-align: left;
            margin-bottom: 5px;
        }
        .multi-preview {
            margin: 10px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: white;
        }
        .multi-preview h4 {
            margin-bottom: 10px;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 APA7 表格格式转换器</h1>
        
        <div class="upload-area" id="dropZone">
            <p>📁 拖拽 Excel 或 CSV 文件到此处，或点击选择文件</p>
            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">选择文件</button>
        </div>

        <div id="fileInfo" style="display:none; margin: 15px 0; padding: 10px; background: #e8f4fd; border-radius: 5px;">
            <span id="fileName"></span>
        </div>

        <div class="sheet-selector" id="sheetSelector" style="display:none;">
            <h4>📑 选择 Sheet (可多选):</h4>
            <div id="sheetList"></div>
            <div class="sheet-actions">
                <button class="btn btn-secondary" onclick="selectAllSheets()">✅ 全选</button>
                <button class="btn btn-secondary" onclick="deselectAllSheets()">❌ 取消全选</button>
                <span id="selectedCount" style="margin-left: 15px; color: #666;"></span>
            </div>
        </div>

        <div class="options" id="formatOptions">
            <h4>⚙️ 格式选项</h4>
            <div class="option-item">
                <label><input type="checkbox" id="showNumber" checked> 表格编号 (如: 表 1)</label>
            </div>
            <div class="option-item">
                <label><input type="checkbox" id="boldHeader" checked> 列标题加粗</label>
            </div>
            <div class="option-item">
                <label><input type="checkbox" id="showBorder" checked> 显示边框</label>
            </div>
            <div class="option-item">
                <label><input type="checkbox" id="italicTitle" checked> 标题斜体</label>
            </div>
        </div>

        <div style="text-align: center; margin: 20px 0;">
            <button class="btn btn-primary btn-lg" id="convertBtn" onclick="convertToAPA()">🔄 转换为 APA 格式</button>
        </div>

        <div id="status"></div>

        <div class="preview" id="preview" style="display:none;">
            <h4>👁️ 预览</h4>
            <div id="tablePreview"></div>
        </div>

        <div class="download-buttons" id="downloadButtons" style="display:none">
            <button class="btn btn-success" onclick="downloadAsWord()">📥 下载 Word</button>
            <button class="btn btn-warning" onclick="downloadAsExcel()">📊 下载 Excel (多表格)</button>
            <button class="btn btn-secondary" onclick="downloadAsHTML()">💾 下载 HTML</button>
        </div>
    </div>

    <script>
        let currentWorkbook = null;
        let currentSheetName = null;
        let currentData = null;
        let convertedTable = null;
        let selectedSheets = new Set();
        let convertedTables = []; // 存储所有转换后的表格

        // 拖拽上传
        const dropZone = document.getElementById('dropZone');
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            handleFile(file);
        });

        // 文件选择
        document.getElementById('fileInput').addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file) return;
            
            const fileName = file.name.toLowerCase();
            
            if (fileName.endsWith('.csv')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const content = e.target.result;
                    parseCSV(content);
                    showFileInfo(file.name, file.size);
                };
                reader.readAsText(file);
            } else if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = new Uint8Array(e.target.result);
                    currentWorkbook = XLSX.read(data, { type: 'array' });
                    showSheetSelector();
                    showFileInfo(file.name, file.size);
                };
                reader.readAsArrayBuffer(file);
            } else {
                showStatus('error', '❌ 不支持的文件格式，请上传 Excel 或 CSV 文件');
            }
        }

        function parseCSV(content) {
            const lines = content.split('\n');
            const headers = lines[0].split(',');
            currentData = [headers];
            
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim()) {
                    currentData.push(lines[i].split(','));
                }
            }
            
            document.getElementById('convertBtn').disabled = false;
        }

        function showSheetSelector() {
            document.getElementById('sheetSelector').style.display = 'block';
            const sheetList = document.getElementById('sheetList');
            sheetList.innerHTML = '';
            selectedSheets.clear();
            
            currentWorkbook.SheetNames.forEach((name, index) => {
                const item = document.createElement('label');
                item.className = 'sheet-item';
                item.innerHTML = `
                    <input type="checkbox" value="${name}" ${index === 0 ? 'checked' : ''} onchange="toggleSheet('${name}')">
                    <span>${name}</span>
                `;
                sheetList.appendChild(item);
                
                if (index === 0) {
                    selectedSheets.add(name);
                }
            });
            
            updateSelectedCount();
            document.getElementById('convertBtn').disabled = false;
        }

        function toggleSheet(name) {
            if (selectedSheets.has(name)) {
                selectedSheets.delete(name);
            } else {
                selectedSheets.add(name);
            }
            updateSelectedCount();
        }

        function selectAllSheets() {
            if (!currentWorkbook) return;
            currentWorkbook.SheetNames.forEach(name => {
                selectedSheets.add(name);
            });
            document.querySelectorAll('.sheet-item input[type="checkbox"]').forEach(cb => {
                cb.checked = true;
            });
            updateSelectedCount();
        }

        function deselectAllSheets() {
            selectedSheets.clear();
            document.querySelectorAll('.sheet-item input[type="checkbox"]').forEach(cb => {
                cb.checked = false;
            });
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const count = selectedSheets.size;
            document.getElementById('selectedCount').textContent = 
                count > 0 ? `已选择 ${count} 个表格` : '未选择任何表格';
        }

        function showFileInfo(name, size) {
            const fileInfo = document.getElementById('fileInfo');
            fileInfo.style.display = 'block';
            document.getElementById('fileName').textContent = `${name} (${(size / 1024).toFixed(1)} KB)`;
        }

        function convertToAPA() {
            convertedTables = [];
            
            if (currentWorkbook && selectedSheets.size === 0) {
                showStatus('error', '❌ 请至少选择一个 Sheet');
                return;
            }
            
            if (currentWorkbook) {
                // 处理多个 Sheet
                let allTablesHTML = '';
                let tableNum = 1;
                
                selectedSheets.forEach(sheetName => {
                    const worksheet = currentWorkbook.Sheets[sheetName];
                    const data = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                    
                    if (data && data.length > 0) {
                        const tableHTML = generateAPATable(data, sheetName, tableNum);
                        convertedTables.push({ name: sheetName, data: data, html: tableHTML });
                        allTablesHTML += tableHTML;
                        tableNum++;
                    }
                });
                
                convertedTable = allTablesHTML;
                showStatus('success', `✅ 成功转换 ${convertedTables.length} 个表格!`);
            } else if (currentData) {
                // 处理 CSV
                convertedTable = generateAPATable(currentData, 'Table', 1);
                convertedTables.push({ name: 'Table', data: currentData, html: convertedTable });
                showStatus('success', '✅ 转换成功!');
            } else {
                showStatus('error', '❌ 没有数据可转换');
                return;
            }

            // 显示预览
            document.getElementById('tablePreview').innerHTML = convertedTable;
            document.getElementById('preview').style.display = 'block';
            document.getElementById('downloadButtons').style.display = 'block';
        }

        function generateAPATable(data, tableName, tableNum) {
            const showNumber = document.getElementById('showNumber').checked;
            const boldHeader = document.getElementById('boldHeader').checked;
            const italicTitle = document.getElementById('italicTitle').checked;

            let numberHTML = showNumber ? `<p class="title">Table ${tableNum}</p>` : '';
            let captionClass = italicTitle ? 'title-italic' : 'title';
            let captionHTML = `<p class="${captionClass}">${tableName}</p>`;
            
            let tableHTML = '<table>\n';
            
            if (data.length > 0) {
                const headers = data[0];
                tableHTML += '<thead><tr>\n';
                headers.forEach(header => {
                    tableHTML += `<th>${header || ''}</th>\n`;
                });
                tableHTML += '</tr></thead>\n';
            }
            
            tableHTML += '<tbody>\n';
            for (let i = 1; i < data.length; i++) {
                tableHTML += '<tr>\n';
                data[i].forEach(cell => {
                    tableHTML += `<td>${cell || ''}</td>\n`;
                });
                tableHTML += '</tr>\n';
            }
            tableHTML += '</tbody>\n</table>';
            
            let noteHTML = '<p class="table-note">Note. </p>';

            return `
                <div class="multi-preview">
                    ${numberHTML}
                    ${captionHTML}
                    ${tableHTML}
                    ${noteHTML}
                </div>
            `;
        }

        function downloadAsHTML() {
            if (!convertedTable) {
                showStatus('error', '❌ 请先转换表格');
                return;
            }
            
            const blob = new Blob([convertedTable], { type: 'text/html;charset=utf-8' });
            download(blob, 'apa-tables.html');
            showStatus('success', '✅ HTML 下载成功!');
        }

        function downloadAsWord() {
            if (!convertedTable) {
                showStatus('error', '❌ 请先转换表格');
                return;
            }
            
            const html = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Times New Roman', Times, serif; }
        table { border-collapse: collapse; width: 100%; margin: 20px 0; }
        td, th { border: 1px solid #000; padding: 8px; }
        th { font-weight: bold; background-color: #f0f0f0; }
    </style>
</head>
<body>
    ${convertedTable}
</body>
</html>
            `;
            
            const blob = new Blob([html], { type: 'application/msword;charset=utf-8' });
            download(blob, 'apa-tables.doc');
            showStatus('success', '✅ Word 下载成功!');
        }

        function downloadAsExcel() {
            if (convertedTables.length === 0) {
                showStatus('error', '❌ 请先转换表格');
                return;
            }
            
            try {
                // 创建新工作簿
                const wb = XLSX.utils.book_new();
                
                // 为每个转换的表格创建一个 Sheet
                convertedTables.forEach((table, index) => {
                    const ws = XLSX.utils.aoa_to_sheet(table.data);
                    
                    // Sheet 名称最长 31 字符
                    let sheetName = table.name.substring(0, 31);
                    // 移除非法字符
                    sheetName = sheetName.replace(/[\\\/\?\*\[\]]/g, '_');
                    
                    XLSX.utils.book_append_sheet(wb, ws, sheetName);
                });
                
                // 下载文件
                XLSX.writeFile(wb, 'apa-tables.xlsx');
                showStatus('success', `✅ Excel 下载成功! 包含 ${convertedTables.length} 个表格`);
            } catch (error) {
                console.error('Excel 导出错误:', error);
                showStatus('error', '❌ Excel 导出失败: ' + error.message);
            }
        }

        function download(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function showStatus(type, message) {
            const status = document.getElementById('status');
            status.className = 'status ' + type;
            status.textContent = message;
            status.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    status.style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>
</html>
